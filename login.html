<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{
    margin:0; min-height:100vh;
    background:#0F1B2D; color:#F2EFE8;
    font-family:'Inter', sans-serif;
    display:flex; align-items:center; justify-content:center;
  }
  .card{
    background:#16273D; border:1px solid #2A3E5A; border-radius:10px;
    padding:40px 36px; max-width:400px; width:100%;
  }
  h1{ font-family:'Fraunces', serif; font-weight:500; font-size:26px; margin:0 0 8px; }
  p{ color:#9AAAC2; font-size:14px; }
  button{
    margin-top:20px; background:transparent; border:1px solid #2A3E5A;
    color:#F2EFE8; padding:10px 16px; border-radius:8px; cursor:pointer; font-size:14px;
  }
  button:hover{ border-color:#C9A876; color:#DABE94; }
</style>
</head>
<body>
  <div class="card">
    <h1 id="greeting">Checking session…</h1>
    <p id="detail"></p>
    <button id="logoutBtn">Sign out</button>
  </div>

<script>
  async function loadSession() {
    try {
      const res = await fetch('/api/me', { credentials: 'include' });
      if (!res.ok) throw new Error();
      const data = await res.json();
      document.getElementById('greeting').textContent = 'Signed in';
      document.getElementById('detail').textContent = data.email;
    } catch {
      window.location.href = '/login.html';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login.html';
  });

  loadSession();
</script>
</body>
</html>
